# ============================================
# SERMUL Frontend - Nginx Configuration
# SPA (Vue 3) + Reverse Proxy a FastAPI
# Referencia: techs_v3.md:247-249
# ============================================

server {
    listen 80;
    server_name localhost;

    # Directorio raíz de la SPA
    root /usr/share/nginx/html;
    index index.html;

    # --- Reverse Proxy: /api/* → Backend FastAPI ---
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones lentas (importación Excel)
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # --- Archivos estáticos (PETARs PDF, etc.) ---
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback: todas las rutas al index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Compresión Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # --- Seguridad básica ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
